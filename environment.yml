name: hsi_rf_classifier
channels:
  - pytorch
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - numpy>=1.24
  - pandas>=1.5
  - matplotlib>=3.6
  - scipy>=1.10
  - scikit-learn>=1.2
  - tqdm>=4.64
  - tifffile>=2023.1
  - seaborn>=0.12
  - statsmodels>=0.13
  - joblib>=1.2

  # PyTorch — required for HSI_Labeled_Dataset (SAM spectral weighting)
  # Adjust cpuonly / cuda version as needed. See https://pytorch.org.
  - pytorch
  - cpuonly          # remove this line and add pytorch-cuda=12.1 for GPU

  - pip
  - pip:
    - shap>=0.42
    - openpyxl>=3.0   # only needed for .xlsx files in training/hsi_load_data.py

# Usage:
#   conda env create  -f environment.yml
#   conda activate hsi_rf_classifier
#
# Update existing env:
#   conda env update -f environment.yml --prune